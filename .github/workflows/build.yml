name: Build

on:
  push:
    branches: [ "*" ]
    tags: [ "*" ]

jobs:
  # ------------------------------------------------------------------
  # Lint
  # ------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: ./agent/go.mod
          cache-dependency-path: ./agent/go.sum
      - name: Install dependencies
        run: sudo apt update && sudo apt install -y libsystemd-dev
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.5
          working-directory: agent

  # ------------------------------------------------------------------
  # Unit Tests
  # ------------------------------------------------------------------
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: ./agent/go.mod
          cache-dependency-path: ./agent/go.sum
      - name: Install dependencies
        run: sudo apt update && sudo apt install -y libsystemd-dev
      - name: Run unit tests
        run: |
          go test -v -coverprofile=coverage.txt ./...
          go tool cover -func=coverage.txt
        working-directory: ./agent

  # ------------------------------------------------------------------
  # Build
  # ------------------------------------------------------------------
  build:
    name: "Build (${{ matrix.os }}/${{ matrix.arch }})"
    needs: test
    strategy:
      matrix:
        include:
        - { runner: 'ubuntu-24.04', os: 'linux', arch: 'amd64' }
        - { runner: 'ubuntu-24.04-arm', os: 'linux', arch: 'arm64' }
        - { runner: 'windows-2022', os: 'windows', arch: 'amd64' }
        - { runner: 'windows-11-arm', os: 'windows', arch: 'arm64' }
    runs-on: ${{ matrix.runner }}

    defaults:
      run:
        shell: bash

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: ./agent/go.mod
        cache-dependency-path: ./agent/go.sum

    - name: Set Environment Variables
      run: |
        EXT=""
        if [[ "${{ matrix.os }}" == "windows" ]]; then EXT=".exe"; fi

        echo "BINARY_NAME=simob-${{ matrix.os }}-${{ matrix.arch }}${EXT}" >> $GITHUB_ENV
        echo "VERSION=${{ github.ref_name }}" >> $GITHUB_ENV
        echo "Go version used: $(go version)"

    - name: Install dependencies (Linux)
      if: runner.os == 'linux'
      run: |
        sudo apt update
        sudo apt install -y libsystemd-dev
      working-directory: ./agent

    - name: Download Go Mods
      run: go mod download
      working-directory: ./agent

    - name: Build agent binaries
      run: |
        echo "Building version: ${{ env.VERSION }}"
        echo "Output binary name: ${{ env.BINARY_NAME }}"

        # Debug
        echo "Building debug binaries..."
        GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build \
          -gcflags="all=-N -l" \
          -ldflags "-X 'agent/internal/version.Version=${{ env.VERSION }}.debug'" \
          -o ../${{ env.BINARY_NAME }}-debug \
          main.go

        # Production
        echo "Building production binaries..."
        GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build \
          -ldflags "-s -w -X 'agent/internal/version.Version=${{ env.VERSION }}'" \
          -o ../${{ env.BINARY_NAME }} \
          main.go
      working-directory: ./agent

    - name: Upload artifact (${{ matrix.os }} ${{ matrix.arch }})
      uses: actions/upload-artifact@v6
      with:
        name: preview-${{ matrix.os }}-${{ matrix.arch }}
        path: |
          ./${{ env.BINARY_NAME }}
          ./${{ env.BINARY_NAME }}-debug
          install.sh
          install.ps1
        if-no-files-found: error

  # ------------------------------------------------------------------
  # Test Linux
  # ------------------------------------------------------------------
  test-linux:
    name: Test Linux (${{ matrix.arch }})
    needs: build
    strategy:
      matrix:
        include:
          - { runner: 'ubuntu-24.04', os: 'linux', arch: 'amd64' }
          - { runner: 'ubuntu-24.04-arm', os: 'linux', arch: 'arm64' }
    runs-on: ${{ matrix.runner }}

    steps:
    - name: Download agent artifact
      uses: actions/download-artifact@v7
      with:
        name: preview-${{ matrix.os }}-${{ matrix.arch }}

    - name: Set Environment Variables
      run: echo "BINARY_NAME=simob-${{ matrix.os }}-${{ matrix.arch }}" >> $GITHUB_ENV

    - name: Run install script
      run: |
        sudo BINARY_PATH="${{ env.BINARY_NAME }}-debug" SKIP_TELEMETRY=1 bash install.sh dummy-api-key --skip-key-check -- --dry-run
        sudo systemctl stop simob.service

    - name: Run agent (simob version)
      run: sudo -u simob-agent env DEBUG=1 simob version

    - name: Run agent (simob config)
      run: sudo -u simob-agent env DEBUG=1 simob config

    - name: Run agent (simob start)
      run: sudo -u simob-agent env DEBUG=1 simob start --dry-run

  # ------------------------------------------------------------------
  # Resource Usage Monitor
  # ------------------------------------------------------------------
  usage-monitor:
    name: Measure resource usage
    needs: test-linux
    continue-on-error: true
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Python 3
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Download agent artifact
        uses: actions/download-artifact@v7
        with:
          name: preview-linux-amd64

      - name: Run usage monitor
        run: |
          chmod +x ./simob-linux-amd64
          python3 monitor_resources.py --run "./simob-linux-amd64 start --dry-run"

  # ------------------------------------------------------------------
  # Test Windows
  # ------------------------------------------------------------------
  test-windows:
    name: Test Windows (${{ matrix.arch }})
    needs: build
    defaults:
      run:
        shell: powershell
    strategy:
      matrix:
        include:
          - { runner: 'windows-2022', os: 'windows', arch: 'amd64' }
          - { runner: 'windows-11-arm', os: 'windows', arch: 'arm64' }
    runs-on: ${{ matrix.runner }}

    steps:
    - name: Download agent artifact
      uses: actions/download-artifact@v7
      with:
        name: preview-windows-amd64

    - name: Install and run agent
      run: |
        $env:BINARY_PATH=".\simob-windows-amd64.exe"
        .\install.ps1 -ApiKey "dummy-api-key" -SkipKeyCheck -SkipTelemetry -SkipServiceStart --dry-run
        $env:DEBUG="1"
        simob version
        simob config
        simob start --dry-run

  # ------------------------------------------------------------------
  # Release
  # ------------------------------------------------------------------
  create-release:
    name: Create GitHub Release
    needs: [test-linux, test-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Download all agent artifacts
      uses: actions/download-artifact@v7
      with:
        path: artifacts

    - name: Generate checksums
      run: |
        cd artifacts
        mv preview-*/simob-* .
        shasum -a 256 simob-* > checksums
        cat checksums

    - name: Create GitHub Release
      if: github.event_name == 'push' && github.ref_type == 'tag'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        files: |
          artifacts/preview-linux-amd64/install.sh
          artifacts/preview-windows-amd64/install.ps1
          artifacts/checksums
          artifacts/simob-linux-amd64
          artifacts/simob-linux-arm64
          artifacts/simob-windows-amd64.exe
          artifacts/simob-windows-arm64.exe
